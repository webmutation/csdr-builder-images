name: ci

on:
  push:
    branches:
      - "JDK21"

permissions:
  id-token: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "webmutation/csdr-build-image"
          install: true

      - name: Build and push
        id: build # Add an ID to reference outputs
        uses: docker/build-push-action@v6
        with:
          tags: "${{ vars.DOCKER_USER }}/docker-build-cloud-demo:${{ github.ref_name }}"
          # For pull requests, export results to the build cache.
          # Otherwise, push to a registry.
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
          provenance: mode=max
          sbom: true

      - name: Generate attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-digest: ${{ steps.build.outputs.digest }} # Use the digest output from the build step
          predicate-type: slsa-provenance

      - name: Install cosign
        uses: sigstore/cosign-installer@v2
        with:
          cosign-release: 'v2.4.3' # Use the latest stable version of cosign

      - name: Sign Docker image with cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_KEY }}" > cosign.key
          cosign sign --key cosign.key --yes ${{ vars.DOCKER_USER }}/docker-build-cloud-demo:${{ github.ref_name }}
